version: '3.8'

services:
  painel:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./painel-admin.html:/app/painel-admin.html:ro
      - ./painel-server.js:/app/server.js:ro
      - ./design-tokens.css:/app/design-tokens.css:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - NODE_ENV=production
      - PORT=3000
    command: sh -c "npm install express && node server.js"
    networks:
      - traefik-public
      - internal-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: on-failure
        delay: 15s
        max_attempts: 5
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.painel.rule=Path(`/painel`) || Path(`/api/*`)"
        - "traefik.http.routers.painel.entrypoints=web,websecure"
        - "traefik.http.routers.painel.tls.certresolver=letsencrypt"
        - "traefik.http.services.painel.loadbalancer.server.port=3000"

networks:
  traefik-public:
    external: true
  internal-net:
    external: true
