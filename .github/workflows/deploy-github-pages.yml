name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths: ['docs/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: docs/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('docs/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: |
          cd docs
          npm install --legacy-peer-deps

      - name: Build Next.js application
        run: |
          cd docs
          npm run build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Prepare deployment directory
        run: |
          cd docs
          # Copy Matrix installation guide as main page
          cp matrix-index.html out/index.html
          # Copy both guides
          cp matrix-index.html out/matrix.html
          cp simple-index.html out/simple.html
          # Create a simple redirect page for root
          mkdir -p out/install
          cp matrix-index.html out/install/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4