name: Deploy Simple to Cloudflare Pages

on:
  workflow_dispatch:
    inputs:
      deploy_type:
        description: 'Which guide to deploy'
        required: true
        default: 'matrix'
        type: choice
        options:
        - matrix
        - simple
        - both

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Static Guide to Cloudflare Pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare deployment directory
        run: |
          mkdir -p deploy
          cd docs
          
          if [ "${{ github.event.inputs.deploy_type }}" = "matrix" ] || [ "${{ github.event.inputs.deploy_type }}" = "both" ]; then
            # Clean installation guide as main page (most polished)
            cp clean-install.html ../deploy/index.html
            cp matrix-index.html ../deploy/matrix.html
            echo "Clean installation guide deployed as main page"
          fi
          
          if [ "${{ github.event.inputs.deploy_type }}" = "simple" ]; then
            # Clean installation guide as main page
            cp clean-install.html ../deploy/index.html
            echo "Clean installation guide deployed as main page"
          fi
          
          if [ "${{ github.event.inputs.deploy_type }}" = "both" ]; then
            cp simple-index.html ../deploy/simple.html
            cp clean-install.html ../deploy/clean.html
            echo "All guides deployed"
          fi
          
          # Create install subdirectory with clean guide
          mkdir -p ../deploy/install
          cp clean-install.html ../deploy/install/index.html

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: caixapreta-install-guide
          directory: deploy
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: '3'